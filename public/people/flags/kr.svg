<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <rect width="900" height="600" fill="#fff"/>
  <!-- 태극 -->
  <circle cx="450" cy="300" r="150" fill="#cd2e3a"/>
  <path d="M450 150 A150 150 0 0 1 450 450 A75 75 0 0 1 450 300 A75 75 0 0 0 450 150 Z" fill="#0047a0"/>
  <!-- 4괘 -->
  <g fill="#000">
    <!-- 건(乾) 좌상 -->
    <g transform="translate(232 156) rotate(-33.69)">
      <rect x="-50" y="-30" width="100" height="16"/>
      <rect x="-50" y="-8" width="100" height="16"/>
      <rect x="-50" y="14" width="100" height="16"/>
    </g>
    <!-- 감(坎) 우상 -->
    <g transform="translate(668 156) rotate(33.69)">
      <rect x="-50" y="-30" width="42" height="16"/><rect x="8" y="-30" width="42" height="16"/>
      <rect x="-50" y="-8" width="100" height="16"/>
      <rect x="-50" y="14" width="42" height="16"/><rect x="8" y="14" width="42" height="16"/>
    </g>
    <!-- 리(離) 좌하 -->
    <g transform="translate(232 444) rotate(33.69)">
      <rect x="-50" y="-30" width="100" height="16"/>
      <rect x="-50" y="-8" width="42" height="16"/><rect x="8" y="-8" width="42" height="16"/>
      <rect x="-50" y="14" width="100" height="16"/>
    </g>
    <!-- 곤(坤) 우하 -->
    <g transform="translate(668 444) rotate(-33.69)">
      <rect x="-50" y="-30" width="42" height="16"/><rect x="8" y="-30" width="42" height="16"/>
      <rect x="-50" y="-8" width="42" height="16"/><rect x="8" y="-8" width="42" height="16"/>
      <rect x="-50" y="14" width="42" height="16"/><rect x="8" y="14" width="42" height="16"/>
    </g>
  </g>
</svg>
